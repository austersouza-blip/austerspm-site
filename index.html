<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Móveis</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      padding-top: 70px;
    }

    /* TOP BAR FIXA */
    header {
      background: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;

      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    /* BOTÃO LOGIN */
    .login-btn {
      margin-left: 10px;
      padding: 6px 12px;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 400px;
      background: url("https://images.unsplash.com/photo-1505693416388-ac5ce068fe85") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;

      margin-bottom: 40px; /* 👈 ESPAÇO ADICIONADO */
    }

    .hero h1 {
      color: white;
      font-size: 60px;
      background: rgba(0,0,0,0.3);
      padding: 10px 20px;
      border-radius: 10px;
    }

    /* PRODUTOS */
    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .filters {
      width: 200px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      height: fit-content;
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(1, 1fr);
      }

      .filters {
        display: none;
      }

      .hero h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <header>
    <h2>AusterSPM</h2>
    <nav>
      <a href="#">Móveis</a>
      <a href="#">Plano de Corte</a>
      <a href="#">Novidades</a>
      <button class="login-btn">Login</button>
    </nav>
  </header>

  <!-- HERO -->
  <div class="hero">
    <h1>Móveis Paramétricos</h1>
  </div>

  <!-- PRODUTOS -->
  <div class="grid">

    <div class="card">
      <img src="https://finger.ind.br/wp-content/uploads/2023/01/cena-180-closet-clay-web-2048x1152.jpg">
      <p>Closet</p>
    </div>

    <div class="card">
      <img src="https://casaeconstrucao.vivadecora.com.br/wp-content/uploads/2021/03/Dormit%C3%B3rio-decorado-com-cama-com-guarda-roupa-embutido.-Fonte-Revista-VD.jpg">
      <p>Guarda-Roupa</p>
    </div>

    <div class="card">
      <img src="https://admin.archshop.com.br/uploads/taiwan3_da0a202c05.jpg">
      <p>Cozinha</p>
    </div>

    <div class="card">
      <img src="https://imgs.casasbahia.com.br/1549321955/1xg.jpg?imwidth=500">
      <p>Painel</p>
    </div>

  </div>

</body>
</html>
